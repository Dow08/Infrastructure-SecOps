[defaults]
inventory = inventory/hosts.yml
deprecation_warnings = False
inject_facts_as_vars = False
host_key_checking = False

# Vault — stocker le mot de passe dans ~/.vault_pass (chmod 600, jamais commité)
# Créer : echo "MON_MOT_DE_PASSE_VAULT" > ~/.vault_pass && chmod 600 ~/.vault_pass
# Puis : ansible-vault encrypt group_vars/vault.yml
vault_password_file = ~/.vault_pass

[ssh_connection]
pipelining = True
ssh_args = -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=3
