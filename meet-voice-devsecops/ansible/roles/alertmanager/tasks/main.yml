---
- name: "Créer le groupe alertmanager"
  group:
    name: "{{ alertmanager_group }}"
    system: true
    state: present

- name: "Créer l'utilisateur alertmanager"
  user:
    name: "{{ alertmanager_user }}"
    group: "{{ alertmanager_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: "Créer les dossiers alertmanager"
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ alertmanager_user }}"
    group: "{{ alertmanager_group }}"
    mode: '0755'
  loop:
    - "{{ alertmanager_config_dir }}"
    - "{{ alertmanager_data_dir }}"

- name: "Télécharger Alertmanager"
  get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
    dest: "/tmp/alertmanager-{{ alertmanager_version }}.tar.gz"

- name: "Extraire Alertmanager"
  unarchive:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.tar.gz"
    dest: /tmp/
    remote_src: true

- name: "Copier le binaire"
  copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/alertmanager"
    dest: "/usr/local/bin/alertmanager"
    mode: '0755'
    remote_src: true

- name: "Déployer la configuration alertmanager.yml"
  template:
    src: alertmanager.yml.j2
    dest: "{{ alertmanager_config_dir }}/alertmanager.yml"
    owner: "{{ alertmanager_user }}"
    group: "{{ alertmanager_group }}"
    mode: '0644'
  notify: restart alertmanager

- name: "Déployer le service systemd"
  template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    mode: '0644'
  notify: restart alertmanager

- name: "Activer et démarrer alertmanager"
  systemd:
    name: alertmanager
    enabled: true
    state: started
    daemon_reload: true

- name: "Nettoyer les fichiers temporaires"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/alertmanager-{{ alertmanager_version }}.tar.gz"
    - "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64"
