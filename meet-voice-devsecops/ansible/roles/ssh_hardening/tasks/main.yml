---
- name: "Sécurité SSH — Déployer la configuration via template"
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: "Redémarrer SSH"

- name: "Sécurité — Appliquer les changements immédiatement"
  meta: flush_handlers
