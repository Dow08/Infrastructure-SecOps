---
- name: "Créer le groupe promtail"
  group:
    name: "{{ promtail_group }}"
    system: true
    state: present

- name: "Créer l'utilisateur promtail"
  user:
    name: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: adm
    append: true

- name: "Créer le dossier de config promtail"
  file:
    path: "{{ promtail_config_dir }}"
    state: directory
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    mode: '0755'

- name: "Installer unzip"
  apt:
    name: unzip
    state: present
    update_cache: true

- name: "Télécharger Promtail"
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    dest: "/tmp/promtail-linux-amd64.zip"

- name: "Extraire Promtail"
  unarchive:
    src: "/tmp/promtail-linux-amd64.zip"
    dest: /tmp/
    remote_src: true

- name: "Copier le binaire"
  copy:
    src: "/tmp/promtail-linux-amd64"
    dest: "/usr/local/bin/promtail"
    mode: '0755'
    remote_src: true

- name: "Déployer la configuration promtail"
  template:
    src: promtail-config.yml.j2
    dest: "{{ promtail_config_dir }}/promtail-config.yml"
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    mode: '0644'
  notify: restart promtail

- name: "Déployer le service systemd"
  template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  notify: restart promtail

- name: "Activer et démarrer promtail"
  systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true

- name: "Nettoyer les fichiers temporaires"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/promtail-linux-amd64.zip"
    - "/tmp/promtail-linux-amd64"
