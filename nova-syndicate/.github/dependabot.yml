# Dependabot — Auto-update des dépendances
# Doc : https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # === GitHub Actions (versions des actions tierces) ===
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"
    reviewers:
      - "Dow08"

  # === Pip (Python dependencies si on a un requirements.txt) ===
  - package-ecosystem: "pip"
    directory: "/livrables/06_scripts_automation"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
