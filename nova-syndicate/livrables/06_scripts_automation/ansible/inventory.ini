# Inventaire Ansible Nova Syndicate — version Plan B (3 VMs working)
# Localisation cible : /root/nova-ansible/inventory.ini sur Proxmox host

[dc]
dc01 ansible_host=10.1.10.10

[siem_monitoring]
file01 ansible_host=10.1.10.40    # Wazuh + Prometheus + Loki + Grafana

[servers]
db01 ansible_host=10.1.10.30      # MariaDB + Nginx + PHP

# Hôtes a monitorer (cibles des exporters + promtail)
[monitored_hosts:children]
dc
siem_monitoring
servers

# Hôtes côté serveur de la stack observabilité
[observability_server:children]
siem_monitoring

# Sous-groupes spécifiques
[mariadb_hosts]
db01

[nginx_hosts]
db01

[lyon:children]
dc
siem_monitoring
servers

[all:vars]
ansible_user=novaadmin
ansible_ssh_private_key_file=/root/.ssh/bastion_key
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
ansible_become=yes
ansible_become_method=sudo

# Variables stack monitoring (modifiables si besoin)
prometheus_version=2.51.2
loki_version=2.9.7
grafana_version=10.4.2
node_exporter_version=1.7.0
promtail_version=2.9.7
mysqld_exporter_version=0.15.1
nginx_exporter_version=1.1.0

monitoring_server_ip=10.1.10.40
loki_port=3100
prometheus_port=9090
grafana_port=3000
node_exporter_port=9100
mysqld_exporter_port=9104
nginx_exporter_port=9113
